spring.application.name=pet-management

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/petmanagement

# Puerto
server.port=8080

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=petflow_clave_secreta_super_segura_2024
jwt.expiration-ms=3600000

# Cron Jobs
scheduler.vaccine-reminder.cron=0 0 8 * * *
scheduler.pet-audit.cron=0 0 7 * * MON

# Redis — apunta al contenedor Docker (puerto por defecto)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Clave Redis donde se guarda la cola de citas
redis.queue.appointments=petflow:appointments:queue